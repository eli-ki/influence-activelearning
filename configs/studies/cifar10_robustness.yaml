# Robustness + label-efficiency study on CIFAR-10 (ADS / RALIF benchmark)
name: cifar10_robustness
dataset: cifar10
output_dir: results/study/cifar10_robustness
n_seeds: 5
target_fraction: 0.95
baseline_method: random

methods:
  - random
  - uncertainty
  - badge
  - margin
  - loss

scenarios:
  - name: clean
    description: "Clean pool — label efficiency baseline"

  - name: ood_20
    description: "20% OOD rows in pool (ADS-style corruption)"
    pool_corruption:
      ood_fraction: 0.2

  - name: ood_35
    description: "35% OOD rows in pool — stronger corruption"
    pool_corruption:
      ood_fraction: 0.35
